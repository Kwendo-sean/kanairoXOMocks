name: kanairoxo
description: A premium social app UI for KanairoXO
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # For location
  location: ^5.0.0
  
  # For QR Code generation
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.1
  
  # For image picking
  image_picker: ^0.8.7+4
  cached_network_image: ^3.3.1
  camera: ^0.10.5
  video_player: ^2.8.2

  # For date/time pickers
  intl: ^0.18.1
  
  # Existing dependencies
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.5
  file_picker: ^8.0.0+1
  dio: ^5.4.0
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  uuid: ^4.2.2

  # UI Upgrades
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  home_widget: ^0.6.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  image: ^4.1.3

  # New dependencies for Polaroid and Tickets
  gal: ^2.3.2
  share_plus: ^7.2.1
  
  # Audio
  audioplayers: ^6.0.0
  just_audio: ^0.9.38
  
  # Shimmer
  shimmer: ^3.0.0
  
  # Deep linking - Migrated from uni_links
  app_links: ^3.4.5

  # Social Auth
  google_sign_in: ^6.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/kanairoxo_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FAF7F4"
  adaptive_icon_foreground: "assets/images/kanairoxo_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/kanairoxo_logo.png
    - assets/default_profile.png
