name: kanairoxo
description: A premium social app UI for KanairoXO
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # For location
  location: ^5.0.0
  
  # For Google Maps
  google_maps_flutter: ^2.5.0
  
  # For QR Code generation
  qr_flutter: ^4.0.0
  barcode_widget: ^2.0.1
  
  # For image picking
  image_picker: ^0.8.7+4
  
  # For date/time pickers
  intl: ^0.18.1
  
  # Existing dependencies
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  phosphor_flutter: ^2.1.0
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.5
  file_picker: ^8.0.0+1
  dio: ^5.4.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/kanairoxo_logo.png
    - assets/default_profile.png
