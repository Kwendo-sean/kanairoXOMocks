name: kanairoxo
description: A premium social app UI for KanairoXO
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  phosphor_flutter: ^2.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.0.5
  image_picker: ^1.0.4
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/kanairoxo_logo.png
